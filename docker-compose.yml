# Stack / project name (shown in `docker compose ls`, Portainer, and used as
# the default network/volume prefix).
name: telehelm

services:
  # --- Socket proxy: the only thing that touches the real Docker socket ------
  # LinuxServer.io fork is used because its ALLOW_START / ALLOW_STOP /
  # ALLOW_RESTARTS flags actually gate those POSTs WITHOUT enabling blanket
  # POST=1 (which would also unlock container create, exec, etc.).
  socket-proxy:
    image: lscr.io/linuxserver/socket-proxy:latest
    container_name: telehelm-socket-proxy
    restart: unless-stopped
    environment:
      # Health/liveness probe (GET /_ping) — used by the bot and the
      # healthcheck below. Discloses nothing beyond "the daemon is up".
      - PING=1
      # Read access (covers ps / inspect / logs / stats):
      - CONTAINERS=1
      # Lifecycle writes — granular, POST stays 0:
      - POST=0
      - ALLOW_START=1
      - ALLOW_STOP=1
      - ALLOW_RESTARTS=1
      # Everything below is explicitly denied (also the image defaults):
      - EXEC=0
      - IMAGES=0
      - BUILD=0
      - COMMIT=0
      - VOLUMES=0
      - NETWORKS=0
      - SECRETS=0
      - CONFIGS=0
      - SWARM=0
      - SYSTEM=0
      - INFO=0
      - AUTH=0
      - DISTRIBUTION=0
      - PLUGINS=0
      - NODES=0
      - SERVICES=0
      - TASKS=0
    volumes:
      # Host socket path. Defaults to the standard Linux location; override via
      # DOCKER_SOCK in .env when the daemon lives elsewhere (e.g. OrbStack:
      # /Users/<you>/.orbstack/run/docker.sock, or rootless: $XDG_RUNTIME_DIR).
      # :ro stops replacement of the socket file. It does NOT make the API
      # read-only — that is governed entirely by the flags above.
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
    networks:
      - internal          # NO egress network -> proxy cannot reach the internet
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # Backend is "up" only once HAProxy can reach the Docker socket. The bot
      # waits on this (depends_on: service_healthy) so it never pings too early.
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:2375/_ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # --- Bot: reaches Telegram outbound, reaches Docker only via the proxy -----
  # Secrets are loaded from a gitignored `.env` file beside this compose (copy
  # .env.example to .env and fill it in) — so the repo stays safe to push.
  # `required: false` keeps this working on Portainer, where you instead define
  # BOT_TOKEN / ALLOWED_USER_IDS in the stack's "Environment variables" section.
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: telehelm:latest
    pull_policy: build      # always build locally; never pull from a registry
    container_name: telehelm-bot
    restart: unless-stopped
    init: true            # proper PID 1 / signal handling
    env_file:
      - path: .env
        required: false
    environment:
      # Topology is fixed here; only secrets/tunables come from .env.
      - NODE_ENV=production
      - DOCKER_PROXY_HOST=socket-proxy
      - DOCKER_PROXY_PORT=2375
    depends_on:
      socket-proxy:
        condition: service_healthy
    networks:
      - internal          # to talk to the proxy
      - egress            # to talk to Telegram (long polling, outbound only)
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

networks:
  internal:
    internal: true        # air-gapped: members get no route to the internet
  egress:
    driver: bridge
